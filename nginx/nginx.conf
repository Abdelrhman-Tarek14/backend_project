worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # ── Basic Settings ──
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 10M;

    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ──
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # ── Gzip Compression ──
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml;

    # ── Rate Limiting ──
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/s;

    # ── Upstream (NestJS App) ──
    upstream nestjs_app {
        server app:3000;
    }

    # ── Redirect HTTP → HTTPS ──
    server {
        listen 80;
        server_name _;   # the real domain name will be here

        # Allow health checks over HTTP
        location /health {
            proxy_pass http://nestjs_app;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS Server ──
    server {
        listen 443 ssl;
        http2 on;
        server_name _;   # the real domain name will be here

        # ── SSL Certificates ──
        # the real certificates will be here
        ssl_certificate     /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;

        # ── SSL Hardening ──
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        # ── Security Headers ──
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # ── API Routes ──
        location / {
            limit_req zone=api burst=50 nodelay;

            proxy_pass http://nestjs_app;

            # Headers for trust proxy
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Timeouts
            proxy_connect_timeout 60s;
            proxy_send_timeout    60s;
            proxy_read_timeout    60s;
        }

        # ── Auth Routes (stricter rate limit) ──
        location /auth {
            limit_req zone=auth burst=10 nodelay;

            proxy_pass http://nestjs_app;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── WebSocket Support (Socket.IO) ──
        location /socket.io/ {
            proxy_pass http://nestjs_app;

            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket timeout (keep alive)
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        # ── Swagger Docs (optional: block in production) ──
        # to block the swagger in production, uncomment the following lines:
        # location /api {
        #     return 404;
        # }
    }
}
