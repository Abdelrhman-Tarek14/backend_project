
services:
  # ── NestJS Backend ──
  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: eta-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      - NODE_ENV=production
    expose:
      - "3000"
    networks:
      - internal
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ── Salesforce API Integration ──
  sf-api:
    build:
      context: ./salesforce_api
      dockerfile: Dockerfile
    container_name: eta-sf-api
    restart: unless-stopped
    env_file:
      - ./salesforce_api/.env
    environment:
      - NODE_ENV=production
      - BACKEND_URL=http://app:3000
    depends_on:
      app:
        condition: service_healthy
    networks:
      - internal

  # ── Cloudflare Tunnel (Commented for Localtunnel Test) ──
  # tunnel:
  #   image: cloudflare/cloudflared:latest
  #   container_name: eta-tunnel
  #   restart: unless-stopped
  #   command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
  #   depends_on:
  #     - nginx
  #   networks:
  #     - internal



  # ── Frontend (Standalone Nginx Server) ──
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: eta-frontend
    restart: unless-stopped
    networks:
      - internal

  # ── Nginx Reverse Proxy & API Gateway ──
  nginx:
    image: nginx:alpine
    container_name: eta-nginx
    restart: unless-stopped
    ports:
      - "80:80"

    environment:
      - DOMAIN=${DOMAIN:-localhost}
    volumes:
      - ./backend/nginx/nginx.conf.template:/etc/nginx/nginx.conf.template:ro
    command: >
      sh -c "envsubst '$$DOMAIN'
      < /etc/nginx/nginx.conf.template
      > /etc/nginx/nginx.conf
      && nginx -g 'daemon off;'"

    depends_on:
      app:
        condition: service_healthy
      frontend:
        condition: service_started
    networks:
      - internal

networks:
  internal:
    driver: bridge

