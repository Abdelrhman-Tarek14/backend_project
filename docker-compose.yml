services:
  # ── NestJS Backend ──
  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: eta-backend
    restart: unless-stopped
    env_file:
      - path: ./backend/.env
        required: true
      - path: ./backend/.env.development
        required: false
    environment:
      - NODE_ENV=production
    expose:
      - "3000"
    networks:
      - internal
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  # ── Salesforce API Integration ──
  sf-api:
    build:
      context: ./salesforce_api
      dockerfile: Dockerfile
    container_name: eta-sf-api
    restart: unless-stopped
    env_file:
      - path: ./salesforce_api/.env
        required: true
      - path: ./salesforce_api/.env.development
        required: false
    environment:
      - NODE_ENV=production
    depends_on:
      app:
        condition: service_healthy
    volumes:
      - sf-data:/app/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:8080/health', (r) => {if(r.statusCode===200)process.exit(0);else process.exit(1)}).on('error', ()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── Frontend (Served by Nginx) ──
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=https://10.20.13.82/api
        - VITE_SOCKET_URL=https://10.20.13.82
    container_name: eta-frontend
    restart: unless-stopped
    env_file:
      - path: ./frontend/.env
        required: true
      - path: ./frontend/.env.development
        required: false
    networks:
      - internal

  # ── Nginx Reverse Proxy (Gateway) ──
  nginx:
    image: nginx:alpine
    container_name: eta-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      - DOMAIN=10.20.13.82
      - SSL_CERT_PATH=/etc/nginx/ssl/certificate.crt
      - SSL_KEY_PATH=/etc/nginx/ssl/private.key
    volumes:
      - ./nginx/nginx.conf.template:/etc/nginx/templates/nginx.conf.template:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      app:
        condition: service_healthy
      frontend:
        condition: service_started
    networks:
      - internal

  # ── Google Sheets Poller ──
  sheet-poller:
    build:
      context: ./sheet_poller
      dockerfile: Dockerfile
    container_name: eta-sheet-poller
    restart: unless-stopped
    env_file:
      - path: ./sheet_poller/.env
        required: true
      - path: ./sheet_poller/.env.development
        required: false
    environment:
      - NODE_ENV=production
    depends_on:
      app:
        condition: service_healthy
    volumes:
      - ./sheet_poller/data:/app/data
    networks:
      - internal

networks:
  internal:
    driver: bridge

volumes:
  sf-data:
    driver: local